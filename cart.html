<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина - SAKURA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="cart">
    <header class="site-header">
        <div class="container header-inner">
            <a class="logo" href="index.html"><span>S</span>AKURA</a>
            <button class="nav-toggle" type="button" aria-label="Открыть меню">☰</button>
            <nav class="site-nav">
                <a href="index.html" data-nav="home">Главная</a>
                <a href="menu.html" data-nav="menu">Меню</a>
                <a href="about.html" data-nav="about">О нас</a>
                <a href="cart.html" data-nav="cart">Корзина <span class="cart-pill js-cart-count">0</span></a>
                <a href="auth.html" data-nav="auth">Войти</a>
                <a href="account.html" data-nav="account">Кабинет</a>
            </nav>
            <button class="theme-toggle js-theme-toggle" type="button" aria-label="Сменить тему">Светлая</button>
        </div>
    </header>

    <main class="page-main">
        <section class="page-hero compact-hero">
            <div class="container">
                <p class="eyebrow">Оформление заказа</p>
                <h1>Корзина</h1>
                <p>Проверьте состав заказа, укажите контакты и выберите способ оплаты.</p>
            </div>
        </section>

        <section class="section">
            <div class="container checkout-layout">
                <div class="cart-panel">
                    <div class="cart-panel-head">
                        <h2>Ваш заказ</h2>
                        <button class="ghost-button js-clear-cart" type="button">Очистить</button>
                    </div>
                    <div class="js-cart-items cart-items"></div>
                </div>

                <aside class="order-summary">
                    <h2>Данные доставки</h2>
                    <form class="order-form js-order-form">
                        <label>Имя
                            <input name="name" type="text" placeholder="Иван" required>
                        </label>
                        <label>Телефон
                            <input name="phone" type="tel" placeholder="+7 (999) 999 99-99" required>
                        </label>
                        <label>Адрес
                            <input name="address" type="text" placeholder="Введите адрес доставки" required>
                        </label>
                        <label>Комментарий
                            <textarea name="comment" placeholder="Домофон, приборы, пожелания"></textarea>
                        </label>
                        <div class="field-title">Тип оплаты</div>
                        <div class="payment-choice">
                            <button class="payment active" type="button" data-payment="Онлайн">Онлайн</button>
                            <button class="payment" type="button" data-payment="Курьеру">Курьеру</button>
                        </div>
                        <div class="summary-lines">
                            <div><span>Товары</span><strong class="js-subtotal">0 ₽</strong></div>
                            <div><span>Доставка</span><strong class="js-delivery">0 ₽</strong></div>
                            <div class="total-line"><span>Итого</span><strong class="js-total">0 ₽</strong></div>
                        </div>
                        <button class="btn btn-primary btn-wide" type="submit">Подтвердить заказ</button>
                    </form>
                </aside>
            </div>
        </section>
    </main>

    <div class="toast js-toast" role="status" aria-live="polite"></div>
    <script src="vendor/supabase.js"></script>
    <script src="JAva/supabase-config.js"></script>
    <script src="JAva/app.js"></script>
</body>
</html>
